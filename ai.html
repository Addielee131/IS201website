<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cups and Balls Game</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #eef6ff;
            margin-top: 50px;
        }

        .cups button {
            font-size: 20px;
            padding: 15px;
            margin: 10px;
            cursor: pointer;
        }

        .reset {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }

        .score {
            font-size: 20px;
            margin-top: 20px;
        }

        .message {
            font-size: 24px;
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h1>Cups & Balls Game 🎲</h1>

    <p>Pick a cup (1–3). Get 5 correct guesses to win. One wrong guess = game over.</p>

    <div class="cups">
        <button onclick="guess(1)">Cup 1</button>
        <button onclick="guess(2)">Cup 2</button>
        <button onclick="guess(3)">Cup 3</button>
    </div>

    <button class="reset" onclick="resetGame()">Reset Game 🔄</button>

    <div class="score">
        Score: <span id="score">0</span> / 5
    </div>

    <div class="message" id="message"></div>

    <script>
        let score = 0;
        let gameOver = false;

        function guess(playerChoice) {
            if (gameOver) return;

            let correctCup = Math.floor(Math.random() * 3) + 1;

            if (playerChoice === correctCup) {
                score++;
                document.getElementById("score").innerText = score;
                document.getElementById("message").innerText = "Correct! 🎉";

                if (score === 5) {
                    document.getElementById("message").innerText = "YOU WIN! 🏆";
                    gameOver = true;
                }

            } else {
                document.getElementById("message").innerText = "Wrong guess! Game Over 💀";
                gameOver = true;
            }
        }

        function resetGame() {
            score = 0;
            gameOver = false;
            document.getElementById("score").innerText = score;
            document.getElementById("message").innerText = "";
        }
    </script>

</body>
</html>
